<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/application.css" />
</head>
<body>

  <header class="topbar">
  <div class="brand">Job Portal</div>
  <div class="topbar-right">
    <nav>
      <a href="/UI/html/browse_job.html">Browse Jobs</a>
      <a href="/UI/html/my_application.html">My Applications</a>
      <a href="/UI/html/notifications.html">Notifications</a>
      <a href="/UI/html/profile.html">Profile</a>
    </nav>
    <a href="/UI/html/job_management.html" class="role-switch">Employer</a>
  </div>
</header>

  <div class="dev-user-bar" id="devUserBar"></div>

  <main class="page">
    <h1>Notifications</h1>
    <p class="subtitle">Stay updated with your application progress.</p>

    <div class="notification-list" id="notificationList">
      <p class="subtitle">Loading notifications...</p>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    const seekerId = (typeof getCurrentSeekerId === "function") ? getCurrentSeekerId() : 1;
    if (typeof renderDevUserBar === "function") {
      renderDevUserBar("devUserBar");
    } else {
      document.getElementById("devUserBar").innerHTML = `
        Acting as: Seeker #${seekerId} — Aisha
        <span style="opacity:0.75">(login stand-in for Sprint 1)</span>
      `;
    }

    function escapeHtml(str) {
      if (!str) return "";
      return str
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function notificationCardHtml(note) {
      return `
        <div class="notification-card">
          <div class="notification-icon">🔔</div>
          <div class="notification-content">
            <h3>${escapeHtml(note.title)}</h3>
            <p>${escapeHtml(note.message)}</p>
            <div class="notification-time">${escapeHtml(note.time_ago)}</div>
          </div>
        </div>
      `;
    }

    async function loadNotifications() {
      const listEl = document.getElementById("notificationList");
      try {
        const response = await fetch(`/api/notifications?seeker_id=${seekerId}`);
        if (!response.ok) throw new Error("Failed to pull database entries");
        const notifications = await response.json();

        if (notifications.length === 0) {
          listEl.innerHTML = `
            <p class="subtitle" style="text-align:center; color:#777; margin-top:30px;">
              You don't have any notifications yet.
            </p>
          `;
          return;
        }

        listEl.innerHTML = notifications.map(notificationCardHtml).join("");
      } catch (err) {
        console.error(err);
        listEl.innerHTML = `
          <p class="status-msg error">
            Couldn't load notifications: ${escapeHtml(err.message)}. Is the FastAPI server running?
          </p>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", loadNotifications);
  </script>
</body>
</html>
