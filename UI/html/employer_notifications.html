<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/application.css" />
</head>
<body>

  <header class="topbar">
  <div class="brand">Job Portal</div>
  <div class="topbar-right">
    <nav>
      <a href="/UI/html/job_management.html">My Postings</a>
      <a href="/UI/html/employer_applications.html">Applications</a>
      <a href="/UI/html/messages.html?role=employer">Messages</a>
      <a href="/UI/html/employer_notifications.html" class="active">Notifications</a>
    </nav>
    <a href="/UI/html/browse_job.html" class="role-switch">Job Seeker</a>
  </div>
</header>

  <div class="dev-user-bar" id="devUserBar"></div>

  <main class="page">
    <h1>Notifications</h1>
    <p class="subtitle">Stay updated on applications and messages from job seekers.</p>

    <div class="notification-list" id="notificationList">
      <p class="subtitle">Loading notifications...</p>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    const employerId = (typeof getCurrentEmployerId === "function") ? getCurrentEmployerId() : 1;
    if (typeof renderDevEmployerBar === "function") {
      renderDevEmployerBar("devUserBar");
    }

    function notificationCardHtml(note) {
      return `
        <div class="notification-card">
          <div class="notification-icon">🔔</div>
          <div class="notification-content">
            <h3>${escapeHtml(note.title)}</h3>
            <p>${escapeHtml(note.message)}</p>
            <div class="notification-time">${escapeHtml(note.time_ago)}</div>
          </div>
        </div>
      `;
    }

    async function loadNotifications() {
      const listEl = document.getElementById("notificationList");
      try {
        const notifications = await apiFetch(`/api/notifications?role=employer&user_id=${employerId}`);

        if (notifications.length === 0) {
          listEl.innerHTML = `
            <p class="subtitle" style="text-align:center; color:#777; margin-top:30px;">
              You don't have any notifications yet.
            </p>
          `;
          return;
        }

        listEl.innerHTML = notifications.map(notificationCardHtml).join("");
      } catch (err) {
        console.error(err);
        listEl.innerHTML = `
          <p class="status-msg error">
            Couldn't load notifications: ${escapeHtml(err.message)}. Is the FastAPI server running?
          </p>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", loadNotifications);
  </script>
</body>
</html>
