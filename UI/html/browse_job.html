<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Job Portal</div>
    <nav>
      <a href="browse_job.html">Browse Jobs</a>
      <a href="profile.html">My Profile</a>
    </nav>
  </header>
  <div class="dev-user-bar" id="devUserBar"></div>

  <main class="page">
    <h1>Browse jobs</h1>
    <p class="subtitle">Search by keyword or filter by location to find relevant openings.</p>

    <form class="search-bar" id="searchForm">
      <input type="text" id="keywordInput" placeholder="Keyword (e.g. 'backend', 'designer')" />
      <input type="text" id="locationInput" placeholder="Location (e.g. 'Penang', 'Remote')" />
      <button type="submit" class="btn btn-primary">Search</button>
    </form>

    <div id="jobList" class="job-list">
      <p class="subtitle">Loading jobs…</p>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    renderDevUserBar("devUserBar");

    const jobListEl = document.getElementById("jobList");

    function renderJobs(jobs) {
      if (jobs.length === 0) {
        jobListEl.innerHTML = `
          <div class="empty-state">
            No jobs match that search. Try a different keyword or clear the location filter.
          </div>`;
        return;
      }

      jobListEl.innerHTML = jobs
        .map(
          (job) => `
        <a class="job-card" href="job_detail.html?id=${job.id}">
          <div class="job-main">
            <h3>${escapeHtml(job.title)}</h3>
            <div class="job-meta">${escapeHtml(job.location || "Location not specified")}</div>
            <div>
              ${job.skills_required.map((s) => `<span class="skill-tag">${escapeHtml(s)}</span>`).join("") ||
                `<span style="color:var(--ink-soft); font-size:0.85rem;">No skills listed</span>`}
            </div>
          </div>
          ${trustSealHtml(job.credibility_score)}
        </a>`
        )
        .join("");
    }

    async function loadJobs(filters = {}) {
      jobListEl.innerHTML = `<p class="subtitle">Loading jobs…</p>`;
      try {
        const jobs = await fetchJobs(filters);
        renderJobs(jobs);
      } catch (err) {
        jobListEl.innerHTML = `<p class="status-msg error">Couldn't load jobs: ${escapeHtml(err.message)}. Is the FastAPI server running?</p>`;
      }
    }

    document.getElementById("searchForm").addEventListener("submit", (e) => {
      e.preventDefault();
      loadJobs({
        keyword: document.getElementById("keywordInput").value.trim(),
        location: document.getElementById("locationInput").value.trim(),
      });
    });

    loadJobs();
  </script>
</body>
</html>
